version: "3.8"

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.6.5
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_BASE_URL=http://host.docker.internal:4000/v1
      - WEBUI_AUTH=False
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=searxng
      - RAG_WEB_SEARCH_URL=http://searxng:8080
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - ai-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  openhands:
    image: ghcr.io/all-hands-ai/openhands:0.34
    container_name: openhands
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - LLM_API_KEY=sk-dummy
      - LLM_BASE_URL=http://host.docker.internal:4000
      - LLM_MODEL=qwen3.6:35b
      - WORKSPACE_DIR=/workspace
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=ghcr.io/all-hands-ai/openhands:0.34
      - LOG_LEVEL=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-data:/home/openhands
      - /root/Google-AI:/workspace:rw
    networks:
      - ai-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  n8n:
    image: n8nio/n8n:1.95.0
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - ai-network

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /root/Google-AI/docker/config/searxng:/etc/searxng:rw
    networks:
      - ai-network

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
    name: ai-network

volumes:
  open-webui-data:
  openhands-data:
  n8n-data:
  qdrant-data:
