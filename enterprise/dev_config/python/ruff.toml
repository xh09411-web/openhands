[lint]
select = [
    "ASYNC",
    "E",
    "W",
    "F",
    "I",
    "Q",
    "B",
]

ignore = [
    "E501",
    "B003",
    "B007",
    "B008",  # Allow function calls in argument defaults (FastAPI Query pattern)
    "B009",
    "B010",
    "B904",
    "B018",
    # Ignore async rules that may have false positives or are informational
    "ASYNC109",  # `yield from` in async function
    "ASYNC110",  # `await` outside async context
    "ASYNC220",  # bare `yield` in async function
    "ASYNC221",  # `yield` with `await` in async function
    "ASYNC230",  # `return` in async function returning non-Awaitable
    "ASYNC251",  # `await` in bare `yield` outside async gen
]

exclude = [
    "app/migrations/*"
]

[lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "single"

[format]
quote-style = "single"
