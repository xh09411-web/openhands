[lint]
select = [
    "ASYNC",
    "E",
    "W",
    "F",
    "I",
    "Q",
    "B",
]

ignore = [
    "E501",
    "B003",
    "B007",
    "B008",  # Allow function calls in argument defaults (FastAPI Query pattern)
    "B009",
    "B010",
    "B904",
    "B018",
    # Ignore async rules that may have false positives or are informational
    "ASYNC109",  # async function with timeout parameter, use asyncio.timeout instead
    "ASYNC110",  # async busy-wait, use Event.wait() instead of while loop with sleep
    "ASYNC220",  # create subprocess in async function with blocking methods
    "ASYNC221",  # run process in async function with blocking methods
    "ASYNC230",  # blocking open() call in async function
    "ASYNC251",  # blocking time.sleep() call in async function
]

exclude = [
    "app/migrations/*"
]

[lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "single"

[format]
quote-style = "single"
