name: Enterprise Check Migrations

on:
  pull_request:
    paths:
      - 'enterprise/migrations/**'
      - 'enterprise/alembic.ini'
      - 'scripts/check_enterprise_migration_integrity.py'
      - '.github/workflows/enterprise-check-migrations.yml'

# Group is per-PR-branch, so this only cancels a superseded run of the SAME PR
# (e.g. after a new push) — never another PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check migration static integrity
        run: python3 scripts/check_enterprise_migration_integrity.py

      - name: Fetch base branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: git fetch origin "$BASE_REF"

      - name: Check if base branch is ancestor of PR
        id: check_up_to_date
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          BASE="origin/${BASE_REF}"
          HEAD="$HEAD_SHA"
          if git merge-base --is-ancestor "$BASE" "$HEAD"; then
            echo "We're up to date with base $BASE"
            exit 0
          else
            echo "NOT up to date with base $BASE"
            exit 1
          fi

      - name: Find Comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: |
            ⚠️ This PR contains **migrations**

      - name: Comment warning on PR
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ⚠️ This PR contains **migrations**. Please synchronize before merging to prevent conflicts.

  apply-migrations:
    name: Apply migrations on test DB
    runs-on: ubuntu-24.04
    needs: [check-sync]
    strategy:
      matrix:
        # Test both the production driver (pg8000) and the psycopg2 fallback.
        # The CLOUD_SQL_POSTGRES_VERSION env var holds the canonical Cloud SQL
        # major version — update this job's image tag whenever that variable
        # changes in the deploy repo. If CLOUD_SQL_POSTGRES_VERSION is unset,
        # postgres:16 is used as a reasonable fallback (check deploy repo for
        # the current cloudsql-postgres image tag and keep them in sync).
        db-driver: [pg8000, ""]  # [production driver, psycopg2 fallback]
    # Safety timeout: large schemas with many indexes/tables can take 15+ minutes
    # to migrate. Adjust if schema growth outpaces this estimate.
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openhands
          POSTGRES_PASSWORD: openhands
          POSTGRES_DB: openhands
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openhands"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: openhands
      DB_PASS: openhands
      DB_NAME: openhands
      DB_DRIVER: ${{ matrix.db-driver }}  # pg8000 for prod parity, "" for psycopg2
    steps:
      - uses: actions/checkout@v6
      - name: Install poetry via pipx
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "poetry"
      - name: Install Python dependencies using Poetry
        working-directory: ./enterprise
        run: poetry install --with dev,test
      - name: Show migration history
        working-directory: ./enterprise
        run: poetry run alembic history --verbose
      - name: Apply full migration chain (upgrade head)
        working-directory: ./enterprise
        run: |
          echo "::group::alembic upgrade head (from empty DB)"
          START=$(date +%s)
          poetry run alembic upgrade head
          echo "upgrade head took $(( $(date +%s) - START ))s"
          echo "::endgroup::"
          poetry run alembic current
      - name: Round-trip the newest migration (downgrade -1, upgrade head)
        working-directory: ./enterprise
        # Fail fast if downgrade fails. The database is throwaway, and the
        # final reporting step still prints the current revision for debugging.
        run: |
          echo "::group::downgrade -1 then re-upgrade"
          poetry run alembic downgrade -1
          poetry run alembic upgrade head
          echo "::endgroup::"
          poetry run alembic current
      - name: Report migration state
        if: always()
        working-directory: ./enterprise
        run: poetry run alembic current || true
