name: Enterprise Apply Migrations on Test DB

# Applies the full enterprise migration chain against a throwaway test Postgres, using the
# SAME driver as production (pg8000) and the real migrations/env.py harness
# (advisory lock + transaction wrapping). This catches migration bugs before
# merge/deploy instead of in the staging migrate-db init container — e.g. a
# CREATE INDEX CONCURRENTLY in an autocommit_block, which crashes under env.py.
#
# This workflow is gated on the Enterprise Check Migrations workflow completing
# successfully. The gating ensures static checks (migration integrity, up-to-date)
# pass before running the expensive apply-migrations tests.

on:
  pull_request:
    paths:
      - 'enterprise/migrations/**'
      - 'enterprise/alembic.ini'
      - '.github/workflows/enterprise-apply-migrations-test-db.yml'

  # Run after Enterprise Check Migrations completes successfully.
  # This provides the gating behavior: apply-migrations only runs if
  # check-migrations passes (static integrity, up-to-date check).
  workflow_run:
    workflows: ["Enterprise Check Migrations"]
    types: [completed]
    branches: ['*']

# Group is per-PR-branch, so this only cancels a superseded run of the SAME PR
# (e.g. after a new push) — never another PR. cancel-in-progress is safe here
# because each run uses its own throwaway Postgres service that is destroyed with
# the runner: cancelling mid-migration leaves no shared/persistent state behind.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  apply-migrations:
    name: Apply migrations on test DB
    runs-on: ubuntu-24.04
    # Only run if the triggering workflow (Enterprise Check Migrations) succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        # Test both the production driver (pg8000) and the psycopg2 fallback.
        # The CLOUD_SQL_POSTGRES_VERSION env var holds the canonical Cloud SQL
        # major version — update this job's image tag whenever that variable
        # changes in the deploy repo. If CLOUD_SQL_POSTGRES_VERSION is unset,
        # postgres:16 is used as a reasonable fallback (check deploy repo for
        # the current cloudsql-postgres image tag and keep them in sync).
        db-driver: [pg8000, ""]  # [production driver, psycopg2 fallback]
    # Safety timeout: large schemas with many indexes/tables can take 15+ minutes
    # to migrate. Adjust if schema growth outpaces this estimate.
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openhands
          POSTGRES_PASSWORD: openhands
          POSTGRES_DB: openhands
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openhands"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: openhands
      DB_PASS: openhands
      DB_NAME: openhands
      DB_DRIVER: ${{ matrix.db-driver }}  # pg8000 for prod parity, "" for psycopg2
    steps:
      - uses: actions/checkout@v6
      - name: Install poetry via pipx
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "poetry"
      - name: Install Python dependencies using Poetry
        working-directory: ./enterprise
        run: poetry install --with dev,test
      - name: Show migration history
        working-directory: ./enterprise
        run: poetry run alembic history --verbose
      - name: Apply full migration chain (upgrade head)
        working-directory: ./enterprise
        run: |
          echo "::group::alembic upgrade head (from empty DB)"
          START=$(date +%s)
          poetry run alembic upgrade head
          echo "upgrade head took $(( $(date +%s) - START ))s"
          echo "::endgroup::"
          poetry run alembic current
      - name: Round-trip the newest migration (downgrade -1, upgrade head)
        working-directory: ./enterprise
        # Fail fast if downgrade fails. The database is throwaway, and the
        # final reporting step still prints the current revision for debugging.
        run: |
          echo "::group::downgrade -1 then re-upgrade"
          poetry run alembic downgrade -1
          poetry run alembic upgrade head
          echo "::endgroup::"
          poetry run alembic current
      - name: Report migration state
        if: always()
        working-directory: ./enterprise
        run: poetry run alembic current || true